########################################################################################################################
### TẤT CẢ message của plugin tập trung ở đây.
### Hỗ trợ MiniMessage (https://docs.advntr.dev/minimessage/format.html) và mã legacy '&' .
### Placeholder dùng dạng {Tên} - ví dụ {X}, {Y}, {Z}, {Player}, {loai}, {so_luong}...
### Để tắt một message broadcast, đặt giá trị rỗng (ví dụ: chest.spawn: "")
########################################################################################################################

# Tiền tố tùy chọn (hiện chưa tự ghép vào các message, giữ lại để dùng sau nếu muốn).
prefix: "<dark_red>[RandomLootChest] "

# ===================== Message chung =====================
general:
  no_permission: "<red>Không đủ quyền."
  no_permission_general: "<red>Không đủ quyền hạn."
  player_only: "<red>Chỉ người chơi được dùng"
  unknown_command: "<red>Lệnh không tồn tại! Sử dụng <yellow>/rlc <red>để xem trợ giúp."
  chest_type_not_found: "<red>Không tìm thấy loại rương <yellow>{loai}<red>!"

# ===================== Message rương / loot =====================
chest:
  # Broadcast khi rương ngẫu nhiên xuất hiện. {X} {Y} {Z} = tọa độ. Để trống để tắt.
  spawn: |-
    <gold><bold>--------------------------------------</bold>
    <red>rương đã xuất hiện tại <green>x: <gold>{X} <green>y: <gold>{Y} <green>z: <gold>{Z}.
    <gold><bold>--------------------------------------</bold>
  # Broadcast khi người chơi loot rương. {X} {Y} {Z} {Player}
  loot: |-
    <gold><bold>--------------------------------------</bold>
    <dark_red>{Player} <red>đã loot rương tại <green>x: <gold>{X} <green>y: <gold>{Y} <green>z: <gold>{Z}.
    <gold><bold>--------------------------------------</bold>
  # Broadcast khi rương biến mất. {X} {Y} {Z}
  kill: |-
    <gold><bold>--------------------------------------</bold>
    <dark_red>rương tại <green>x: <gold>{X} <green>y: <gold>{Y} <green>z: <gold>{Z} <dark_red>đã biến mất!
    <gold><bold>--------------------------------------</bold>
  # Tiêu đề inventory loot
  inventory_name: "<red>Chúc mừng!"
  # Khi người chơi cố phá rương mà không được phép
  cannot_break: "<red>Bạn không thể phá rương loot!"
  # Khi người chơi có quyền phá được 1 rương ngẫu nhiên
  broke_random: "<green>Bạn đã phá được 1 hòm thính"
  # Khi người chơi có quyền xóa 1 rương cố định bằng cách phá
  broke_fixed: "<green>rương cố định đã bị xóa khỏi bộ sưu tập"
  # Khi người chơi cố đặt block tại ô có RLC chest
  cannot_place: "<red>Không thể đặt block tại vị trí RLC Chest!"

# ===================== Wand (que chọn vùng) =====================
wand:
  received: "<green>Bạn đã nhận được que wand!"
  no_permission: "<red>Không đủ quyền!"
  pos1_set: "<green>Đã đặt pos1 tại: <white>{loc}"
  pos2_set: "<green>Đã đặt pos2 tại: <white>{loc}"

# ===================== Đợi chọn rương (/rlc addchest) =====================
wait:
  countdown: "<green>Bạn còn <white>{giay} <green>giây để nhấn chuột phải vào rương <white>=O"
  timeout: "<red>Hết thời gian. Bạn đã quá chậm <white>=("
  cancelled: "<red>Đã hủy <gray>fo_O"

# ===================== Các lệnh /rlc =====================
command:
  # --- Trợ giúp ---
  help_header: "<dark_red>*-----<red><bold>RandomLootChest</bold><dark_red>*-----*"
  help_commands: "<red><bold>Lệnh:</bold>"
  help_line_additem: "<red><yellow>/rlc additem <gray>(Mở GUI thêm vật phẩm - chọn loại rương)"
  help_line_addchest: "<red><yellow>/rlc addchest [tên] <gray>(Có tên: thêm rương cố định theo tên khi nhấn phải chuô vào rương có sẵn hoặc vùng đã set; không: tạo loại ruương)"
  help_line_addchesttype: "<red><yellow>/rlc addchesttype [tên] <gray>(Có tên: thêm rương cố định theo tên; không: tạo loại ruương)"
  help_line_delchest: "<red><yellow>/rlc delchest <gray>(Xóa rương cố định)"
  help_line_delall: "<red><yellow>/rlc delall <gray>(Xóa tất cả rương cố định)"
  help_line_killall: "<red><yellow>/rlc killall <gray>(Xóa tất cả rương ngẫu nhiên)"
  help_line_togglebreak: "<red><yellow>/rlc togglebreak <gray>(Bật/tắt chế độ phá rương)"
  help_line_forcespawn: "<red><yellow>/rlc forcespawn <gray>(Tạo rương ngẫu nhiên)"
  help_line_rndtime: "<red><yellow>/rlc rndtime <gray>(Ngẫu nhiên hóa thời gian)"
  help_line_wand: "<red><yellow>/rlc wand <gray>(Nhận que wand)"
  help_line_set: "<red><yellow>/rlc set [loại] <gray>(Set rương trong vùng, mặc định default)"
  help_line_unset: "<red><yellow>/rlc unset <gray>(Unset rương trong vùng)"
  help_line_chesttypes: "<red><yellow>/rlc chesttypes <gray>(Danh sách loại rương)"
  help_line_chesttypeinfo: "<red><yellow>/rlc chesttypeinfo <italic>loại</italic> <gray>(Xem chi tiết loại rương)"
  help_line_delchesttype: "<red><yellow>/rlc delchesttype <italic>loại</italic> <gray>(Xóa loại rương)"
  help_line_resettimer: "<red><yellow>/rlc resettimer [random/fixedchest] <gray><italic>loại</italic> <gray>(Reset timer)"
  help_line_reload: "<red><yellow>/rlc reload <gray>(Reload config, chest types, database)"
  help_line_spawn: "<red><yellow>/rlc spawn <gray><italic>loại</italic> <italic>x1,y1,z1</italic> <italic>x2,y2,z2</italic> [world] [số lượng] <gray>(Spawn rương trong khu vực)"
  help_line_spawnregion: "<red><yellow>/rlc spawnregion <gray><italic>loại</italic> <italic>regionId</italic> [số lượng] <gray>(Spawn rương trong region)"
  help_line_loottable: "<red><yellow>/rlc loottable <gray><italic>loại</italic> <gray>(Xem danh sách items + tỷ lệ)"
  help_line_regions: "<red><yellow>/rlc regions <gray>(Xem danh sách region)"
  help_footer: "<dark_red>*-----<red><bold>RandomLootChest</bold><dark_red>*-----*"

  console_help_header: "<dark_red>*-----<red><bold>RandomLootChest</bold><dark_red>*-----* <red><bold>Lệnh Console:</bold>"

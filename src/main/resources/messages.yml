  unset_none: "<yellow>Không tìm thấy rương nào!"

  # --- togglebreak ---
  togglebreak_off: "<gold>Đã tắt chế độ phá rương <red>Tắt!"
  togglebreak_on: "<gold>Đã bật chế độ phá rương <green>Bật!"

  # --- killall / delall ---

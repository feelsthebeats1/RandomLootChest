  resettimer_usage: "<red>Sử dụng: <yellow>/rlc resettimer [random/fixedchest] <italic>loại</italic>"
  resettimer_done: "<green>Đã reset timer cho {random} rương ngẫu nhiên và {fixed} rương cố định loại <yellow>{loai}<green>!"
